appId: com.intranet.automation.branch
productName: 内网自动化工具
directories:
  output: ../../dist/branch
files:
  - dist/**
  - index.js
  - package.json
extraResources:
  - from: ../../apps/web/dist/branch
    to: web/branch
  - from: ../../dist/backend
    to: backend
win:
  target:
    - portable
mac:
  target:
    - dmg
    - zip
linux:
  target:
    - AppImage
artifactName: intranet-automation-${version}-${os}-${arch}.${ext}
